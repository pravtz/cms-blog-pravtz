# Development overrides — used automatically by `docker compose up`
version: '3.9'

services:
  admin:
    build:
      target: development
    environment:
      - NODE_ENV=development
    volumes:
      - ./apps/admin:/app/apps/admin
      - nexus_data:/data
    ports:
      - "3001:3001"
    command: npm run dev --workspace=@nexus/admin

  blog:
    build:
      target: development
    environment:
      - NODE_ENV=development
    volumes:
      - ./apps/blog:/app/apps/blog
    ports:
      - "3000:3000"
    command: npm run dev --workspace=@nexus/blog

  redis:
    ports:
      - "6379:6379"
