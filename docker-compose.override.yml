# Development overrides — used automatically by `docker compose up`
services:
  admin:
    build:
      target: development
    environment:
      NODE_ENV: development
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      SMTP_FROM: noreply@nexuscms.local
      SMTP_USER: ""
      SMTP_PASS: ""
    volumes:
      - ./apps/admin:/app/apps/admin
      - admin_next:/app/apps/admin/.next
      - nexus_data:/data
    ports:
      - "3001:3001"
    depends_on:
      - redis
      - mailhog
    command: npm run dev --workspace=@nexus/admin

  blog:
    build:
      target: development
    environment:
      NODE_ENV: development
    volumes:
      - ./apps/blog:/app/apps/blog
      - blog_next:/app/apps/blog/.next
    ports:
      - "3000:3000"
    command: npm run dev --workspace=@nexus/blog

  redis:
    ports:
      - "6380:6379"

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  admin_next:
  blog_next:
